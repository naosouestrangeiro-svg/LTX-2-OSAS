name: Sync to Hugging Face

on:
  push:
    branches: ["main"]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Git LFS
        run: git lfs install --system

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup SSH agent (load private key)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Hugging Face to known_hosts
        run: |
          mkdir -p $HOME/.ssh
          ssh-keyscan -H huggingface.co >> $HOME/.ssh/known_hosts
          chmod 644 $HOME/.ssh/known_hosts

      - name: Debug SSH connection (optional — will not fail the job)
        run: |
          ssh -V || true
          ssh-keyscan -H huggingface.co || true
          # This will attempt an SSH auth handshake and print helpful debug lines (secrets masked).
          ssh -T -v git@huggingface.co || true

  - name: Push to Hugging Face
    env:
      GIT_SSH_COMMAND: 'ssh -o StrictHostKeyChecking=yes'
    run: |
      # Add remote if missing (ignore error if already exists)
      git remote add hf git@huggingface.co:Oncesane/LTX-2-3-OSAS.git || true
      
      # Push all branches and tags
      git push -u hf --all
      git push -u hf --tags
